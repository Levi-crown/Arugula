{{NOTICE}}
<form class="login-form" id="reset-password-form" novalidate>
  <label class="login-field" for="reset-password">
    <span>New Password</span>
    <div class="login-field__control">
      <input
        id="reset-password"
        type="password"
        placeholder="Enter new password"
        value="{{NEW_PASSWORD}}"
      />
      <button class="login-password-toggle" type="button" data-action="toggle-password-visibility" data-target="reset-password" aria-label="Show password">
        <span class="login-password-toggle__icon" data-password-icon aria-hidden="true"></span>
      </button>
    </div>
  </label>

  <label class="login-field" for="confirm-password">
    <span>Confirm Password</span>
    <div class="login-field__control">
      <input
        id="confirm-password"
        type="password"
        placeholder="Confirm new password"
        value="{{CONFIRM_PASSWORD}}"
      />
      <button class="login-password-toggle" type="button" data-action="toggle-password-visibility" data-target="confirm-password" aria-label="Show password">
        <span class="login-password-toggle__icon" data-password-icon aria-hidden="true"></span>
      </button>
    </div>
  </label>

  <div class="login-actions login-actions--split">
    <button class="login-link" type="button" data-action="back-to-verified">
      Back
    </button>
    <button class="login-button login-button--inline" type="submit">Update Password</button>
  </div>
</form>
