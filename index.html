<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=./administrator/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Administrator</title>
    <script>
      (function redirectToAdministrator() {
        const query = window.location.search || "";
        const hash = window.location.hash || "";
        window.location.replace(`./administrator/${query}${hash}`);
      })();
    </script>
  </head>
  <body>
    Redirecting to Administrator...
  </body>
</html>
