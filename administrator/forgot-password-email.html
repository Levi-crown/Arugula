{{NOTICE}}
<form class="login-form" id="forgot-email-form" novalidate>
  <label class="login-field" for="recovery-email">
    <span>Email</span>
    <input
      id="recovery-email"
      type="email"
      placeholder="Enter your email"
      value="{{RECOVERY_EMAIL}}"
    />
  </label>

  <div class="login-actions login-actions--split">
    <button class="login-link" type="button" data-action="back-to-login">
      Back to Login
    </button>
    <button class="login-button login-button--inline" type="submit">Next</button>
  </div>
</form>
