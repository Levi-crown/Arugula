{{NOTICE}}
<form class="login-form login-form--otp" id="forgot-otp-form" novalidate>
  <div class="login-step-card">
    <p class="login-step-card__label">Email</p>
    <p class="login-step-card__value">{{RECOVERY_EMAIL}}</p>
  </div>

  <div class="login-field">
    <span>OTP Code</span>
    <div class="otp-row">
      {{OTP_INPUTS}}
    </div>
  </div>

  <div class="login-actions login-actions--split">
    <button class="login-link" type="button" data-action="back-to-email">
      Back
    </button>
    <button class="login-button login-button--inline" type="submit">Next</button>
  </div>
</form>
